name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  # Three variants of the same job, each an Alpine container with a different compiler and
  # sanitizer combination. fail-fast is off so a failure in one variant doesn't cancel the others -
  # they are pass/fail gates (a failure needs ctest's raw output/stack trace, not a table), except
  # gcc-debug, the baseline configuration, which also publishes a per-suite JUnit check-run report.
  #
  # Alpine's grpc-dev/protobuf-dev/abseil-cpp-dev packages are themselves built with GCC, so the
  # Clang variants also check that Clang-compiled code linking against those GCC-built system
  # libraries is ABI-compatible in practice, not just in theory.
  #
  # Why Clang for the sanitizer variant, not GCC: Alpine's GCC package ships with
  # --enable-libsanitizer, but its libsanitizer interceptors (e.g. sendmsg) are written and tested
  # against glibc's struct layouts and crash on musl before this project's own code even runs.
  # Clang's compiler-rt is the sanitizer runtime Alpine's own ecosystem actually maintains musl
  # support for, so the sanitizer variant uses Clang exclusively.
  build-test:
    name: build-and-test (alpine, ${{ matrix.id }})
    runs-on: ubuntu-latest
    container:
      image: alpine:3.24
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: gcc-debug
            packages: g++ nodejs
            cxx_compiler: g++
            cxx_flags: ""
            linker_flags: ""
            asan_options: ""
            publish_report: true
          - id: clang-debug
            packages: clang gcc binutils
            cxx_compiler: clang++
            cxx_flags: ""
            linker_flags: ""
            asan_options: ""
            publish_report: false
          # ASan runtime options below (see ci.yml history for prior art), enabling checks that are
          # off by default upstream:
          # detect_invalid_pointer_pairs=2: flags <, <=, >, >=, - between pointers into unrelated
          # allocations. This project mostly uses smart pointers/references rather than raw pointer
          # arithmetic between objects, so this is expected to be a no-op check, not a source of noise.
          # quarantine_size_mb=512 (default 256): delays heap-block reuse longer, improving
          # use-after-free detection odds; a pure sensitivity increase, not a behavior change.
          # strict_string_checks=1: checks that C-string arguments are actually null-terminated.
          # Narrowly scoped to this project's own C-string usage (e.g. GetFeatureName(), strlen() in
          # rg_utils.cpp), not gRPC/Abseil internals, so not expected to surface non-instrumented-
          # library noise the way ThreadSanitizer's suppressions did (see "Why no ThreadSanitizer
          # job" in docs/testing.md).
          # detect_stack_use_after_return=1: targets this project's actual risk pattern - lambdas
          # that capture local state by reference and get invoked later, possibly from a different
          # thread (EventLoop handlers, the reactor_map_ reference captures).
          # detect_leaks=1: leak detection is on by default upstream; this project previously forced
          # it off pre-emptively on the assumption LeakSanitizer's ptrace requirement wouldn't be
          # available in this container. Turned on after finding out empirically that it works.
          # check_initialization_order=1 + strict_init_order=1: detects static initialization order
          # fiasco bugs (a global's constructor reading another global that hasn't been constructed
          # yet). Off by default because it is expensive and rarely relevant, but this project's
          # per-RPC logger registry (rg_logger) and reactor maps are exactly the kind of static
          # state that pattern breaks.
          - id: clang-asan-ubsan
            packages: clang compiler-rt gcc binutils llvm22
            cxx_compiler: clang++
            cxx_flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
            linker_flags: "-fsanitize=address,undefined"
            asan_options: >-
              detect_invalid_pointer_pairs=2 quarantine_size_mb=512 strict_string_checks=1
              detect_stack_use_after_return=1 detect_leaks=1 check_initialization_order=1 strict_init_order=1
            publish_report: false
    steps:
      # llvm22 (only installed for the sanitizer variant) provides llvm22-symbolizer, needed to
      # turn ASan/UBSan stack traces into function names and line numbers; neither the clang nor
      # the compiler-rt package ships a symbolizer. The sanitizer runtime only recognizes a fixed
      # set of binary names (llvm-symbolizer, addr2line, atos, ...), so it's symlinked to the
      # unversioned name when present.
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            cmake ninja git ${{ matrix.packages }} \
            protobuf-dev \
            grpc-dev \
            abseil-cpp-dev \
            c-ares-dev \
            re2-dev \
            openssl-dev \
            zlib-dev \
            spdlog-dev \
            gflags-dev \
            gtest-dev \
            glaze
          if command -v llvm22-symbolizer > /dev/null 2>&1; then
            ln -sf /usr/bin/llvm22-symbolizer /usr/bin/llvm-symbolizer
          fi

      - uses: actions/checkout@v5

      # TEMPORARY: validating the anderewrey/EventLoop fork's cmake-improvement branch (LANGUAGES
      # CXX + install() rules + GNUInstallDirs, pending as an upstream PR) end-to-end in real CI,
      # before proposing it. Not meant to stay pointed at the fork - revert to upstream + the two
      # patch files once this is validated.
      - name: Build and install EventLoop
        run: |
          git clone https://github.com/anderewrey/EventLoop.git /tmp/EventLoop
          cd /tmp/EventLoop
          git checkout d5d29a0
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }}
          cmake --build build
          cmake --install build
          rm -rf /tmp/EventLoop

      - name: Configure
        run: |
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }} \
            -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          ASAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
          UBSAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
        run: ctest --test-dir build --output-on-failure

      - name: Publish test report
        if: always() && matrix.publish_report
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/*.xml
          include_passed: true
          job_summary: false
          group_suite: false
          include_time_in_summary: true
          check_title_template: '{{SUITE_NAME}}.{{TEST_NAME}}'

      # GoogleTest writes one small JUnit XML file per TEST_F case (not one per binary), each with
      # a single self-closing <testcase/> when it passed, or a <testcase>...<failure/></testcase>
      # block when it failed. This groups them by <testsuite name> (the GoogleTest fixture) into
      # collapsible <details> sections on the check run.
      - name: Attach detailed results to the check run
        if: always() && matrix.publish_report
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dir = 'build/test-results';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.xml'));

            const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const suites = new Map(); // suite name -> test entries

            for (const file of files) {
              const xml = fs.readFileSync(path.join(dir, file), 'utf8');
              const re = /<testcase\b([^>]*?)(\/>|>([\s\S]*?)<\/testcase>)/g;
              let m;
              while ((m = re.exec(xml)) !== null) {
                const attrs = Object.fromEntries(
                  [...m[1].matchAll(/(\w+)="([^"]*)"/g)].map(a => [a[1], a[2]])
                );
                const body = m[3] || '';
                const status = body.includes('<failure') ? 'failed'
                             : attrs.status === 'notrun' ? 'skipped'
                             : 'passed';
                const suite = attrs.classname || 'Unknown';
                if (!suites.has(suite)) suites.set(suite, []);
                suites.get(suite).push({
                  name: attrs.name,
                  status,
                  timeMs: Math.round(parseFloat(attrs.time || '0') * 1000),
                });
              }
            }

            const icon = { passed: '✅', failed: '❌', skipped: '⏭️' };
            let summary = '';
            for (const suite of [...suites.keys()].sort()) {
              const tests = suites.get(suite);
              const failed = tests.filter(t => t.status === 'failed').length;
              const skipped = tests.filter(t => t.status === 'skipped').length;
              const totalMs = tests.reduce((sum, t) => sum + t.timeMs, 0);
              summary += `<details${failed ? ' open' : ''}>\n`;
              summary += `<summary>${escape(suite)} (${tests.length} tests, ${failed} failed, `
                       + `${skipped} skipped, ${totalMs}ms)</summary>\n\n`;
              summary += '| Test | Result | Time |\n| --- | --- | --- |\n';
              for (const t of tests) {
                summary += `| ${escape(t.name)} | ${icon[t.status]} ${t.status} | ${t.timeMs}ms |\n`;
              }
              summary += '\n</details>\n\n';
            }

            // context.sha is the ephemeral merge commit GitHub synthesizes for a pull_request
            // event, not the PR's real head commit - mikepenz/action-junit-report attaches its
            // check to the head commit instead, so looking it up by context.sha here would find
            // nothing and silently skip the update.
            const sha = context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha;
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            const check = data.check_runs.find(c => c.name === 'JUnit Test Report');
            if (check) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check.id,
                output: {
                  title: check.output.title,
                  summary,
                },
              });
            }
