name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: pre-commit/action@v3.0.1

  # Builds the shared Alpine + GCC + Clang + EventLoop image the three build-and-test jobs below
  # run in (see .github/docker/ci.Dockerfile), instead of each job installing the same apk
  # packages and rebuilding EventLoop from scratch. The image tag is a hash of the Dockerfile plus
  # the EventLoop patch, so an unchanged environment is pulled from GHCR instead of rebuilt.
  prepare-image:
    name: prepare CI image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: image
        run: |
          hash=$(cat .github/docker/ci.Dockerfile vcpkg/ports/eventloop/add-install-rules.patch | sha256sum | cut -c1-16)
          echo "image=ghcr.io/${{ github.repository }}/ci-alpine:${hash}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Content-addressed tag: if this exact Dockerfile + EventLoop patch combination was already
      # built and pushed by a previous run, reuse it instead of rebuilding.
      - name: Check whether the image already exists
        id: check
        run: |
          if docker buildx imagetools inspect "${{ steps.image.outputs.image }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/docker/ci.Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}

  # GCC, no sanitizer. Also the only job that publishes the JUnit check-run report - the other jobs
  # below are pass/fail gates where a failure needs ctest's raw output/stack trace, not a table.
  build-test-gcc-debug:
    name: build-and-test (alpine, gcc-debug)
    needs: prepare-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH=/opt/eventloop-gcc

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: build/test-results/*.xml
          include_passed: true
          job_summary: false
          group_suite: false
          include_time_in_summary: true
          check_title_template: '{{SUITE_NAME}}.{{TEST_NAME}}'

      # GoogleTest writes one small JUnit XML file per TEST_F case (not one per binary), each with
      # a single self-closing <testcase/> when it passed, or a <testcase>...<failure/></testcase>
      # block when it failed. This groups them by <testsuite name> (the GoogleTest fixture) into
      # collapsible <details> sections on the check run.
      - name: Attach detailed results to the check run
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dir = 'build/test-results';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.xml'));

            const escape = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const suites = new Map(); // suite name -> test entries

            for (const file of files) {
              const xml = fs.readFileSync(path.join(dir, file), 'utf8');
              const re = /<testcase\b([^>]*?)(\/>|>([\s\S]*?)<\/testcase>)/g;
              let m;
              while ((m = re.exec(xml)) !== null) {
                const attrs = Object.fromEntries(
                  [...m[1].matchAll(/(\w+)="([^"]*)"/g)].map(a => [a[1], a[2]])
                );
                const body = m[3] || '';
                const status = body.includes('<failure') ? 'failed'
                             : attrs.status === 'notrun' ? 'skipped'
                             : 'passed';
                const suite = attrs.classname || 'Unknown';
                if (!suites.has(suite)) suites.set(suite, []);
                suites.get(suite).push({
                  name: attrs.name,
                  status,
                  timeMs: Math.round(parseFloat(attrs.time || '0') * 1000),
                });
              }
            }

            const icon = { passed: '✅', failed: '❌', skipped: '⏭️' };
            let summary = '';
            for (const suite of [...suites.keys()].sort()) {
              const tests = suites.get(suite);
              const failed = tests.filter(t => t.status === 'failed').length;
              const skipped = tests.filter(t => t.status === 'skipped').length;
              const totalMs = tests.reduce((sum, t) => sum + t.timeMs, 0);
              summary += `<details${failed ? ' open' : ''}>\n`;
              summary += `<summary>${escape(suite)} (${tests.length} tests, ${failed} failed, `
                       + `${skipped} skipped, ${totalMs}ms)</summary>\n\n`;
              summary += '| Test | Result | Time |\n| --- | --- | --- |\n';
              for (const t of tests) {
                summary += `| ${escape(t.name)} | ${icon[t.status]} ${t.status} | ${t.timeMs}ms |\n`;
              }
              summary += '\n</details>\n\n';
            }

            // context.sha is the ephemeral merge commit GitHub synthesizes for a pull_request
            // event, not the PR's real head commit - mikepenz/action-junit-report attaches its
            // check to the head commit instead, so looking it up by context.sha here would find
            // nothing and silently skip the update.
            const sha = context.eventName === 'pull_request'
              ? context.payload.pull_request.head.sha
              : context.sha;
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            const check = data.check_runs.find(c => c.name === 'JUnit Test Report');
            if (check) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: check.id,
                output: {
                  title: check.output.title,
                  summary,
                },
              });
            }

  # Clang, no sanitizer. Alpine's grpc-dev/protobuf-dev/abseil-cpp-dev packages are themselves built
  # with GCC, so this also checks that Clang-compiled code linking against those GCC-built system
  # libraries is ABI-compatible in practice, not just in theory.
  build-test-clang-debug:
    name: build-and-test (alpine, clang-debug)
    needs: prepare-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: |
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_PREFIX_PATH=/opt/eventloop-clang

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Clang + ASan/UBSan. GCC's Alpine package ships with --disable-libsanitizer patched back on, but
  # its libsanitizer interceptors (e.g. sendmsg) are written and tested against glibc's struct
  # layouts and crash on musl before this project's own code even runs. Clang's compiler-rt is the
  # sanitizer runtime Alpine's own ecosystem actually maintains musl support for.
  build-test-clang-asan-ubsan:
    name: build-and-test (alpine, clang-asan-ubsan)
    needs: prepare-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # EventLoop itself is never built with sanitizers - only this project's own code is. Linking
      # instrumented binaries against its plain shared library is fine; ASan/UBSan just won't catch
      # bugs inside EventLoop.so itself.
      - name: Configure
        run: |
          cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_PREFIX_PATH=/opt/eventloop-clang \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build

      # detect_invalid_pointer_pairs=2: flags <, <=, >, >=, - between pointers into unrelated
      # allocations. This project mostly uses smart pointers/references rather than raw pointer
      # arithmetic between objects, so this is expected to be a no-op check, not a source of noise.
      # quarantine_size_mb=512 (default 256): delays heap-block reuse longer, improving
      # use-after-free detection odds; a pure sensitivity increase, not a behavior change.
      # strict_string_checks=1: checks that C-string arguments are actually null-terminated.
      # Narrowly scoped to this project's own C-string usage (e.g. GetFeatureName(), strlen() in
      # rg_utils.cpp), not gRPC/Abseil internals, so not expected to surface non-instrumented-
      # library noise the way the TSan suppressions did.
      # detect_stack_use_after_return=1: targets this project's actual risk pattern - lambdas that
      # capture local state by reference and get invoked later, possibly from a different thread
      # (EventLoop handlers, the reactor_map_ reference captures).
      # detect_leaks=1: leak detection is on by default upstream; this project previously forced it
      # off pre-emptively on the assumption LeakSanitizer's ptrace requirement wouldn't be available
      # in this container. Turned on here to find out empirically instead of assuming.
      # check_initialization_order=1 + strict_init_order=1: detects static initialization order
      # fiasco bugs (a global's constructor reading another global that hasn't been constructed
      # yet). Off by default because it is expensive and rarely relevant, but this project's
      # per-RPC logger registry (rg_logger) and reactor maps are exactly the kind of static state
      # that pattern breaks.
      - name: Test
        env:
          ASAN_OPTIONS: >-
            detect_invalid_pointer_pairs=2 quarantine_size_mb=512 strict_string_checks=1
            detect_stack_use_after_return=1 detect_leaks=1 check_initialization_order=1 strict_init_order=1
          ASAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
          UBSAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
        run: ctest --test-dir build --output-on-failure
