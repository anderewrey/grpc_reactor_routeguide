# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # - id: check-yaml
      - id: check-added-large-files
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: detect-private-key
      # .patch files are exact `git diff` output: a blank line or trailing whitespace inside a hunk
      # can be meaningful context (e.g. a blank line in the diffed file itself), not incidental
      # formatting, so these two hooks must not rewrite them.
      - id: end-of-file-fixer
        exclude: \.patch$
      - id: fix-byte-order-marker
      - id: trailing-whitespace
        exclude: \.patch$
      - id: forbid-submodules

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        # Disable rule MD013: maximum line length 80 columns
        #args: [ "--disable MD013 MD024 -- " ]
        args: [ --config=markdownlint.yaml ]

  # - repo: https://github.com/cheshirekow/cmake-format-precommit
  #   rev: v0.6.13
  #   hooks:
  #     - id: cmake-format
  #     - id: cmake-lint
  #       # Disable rule C0307: indentation width, because it does not match the default CLion indentation.
  #       args: [ --line-width=120, --disabled-codes=C0307 ]

  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint
        args: [ &cpplint_filter "--filter=
                 -build/c++11,
                 -build/c++17,
                 -build/namespaces,
                 -whitespace/indent_namespace",
                &cpplint_linelength "--linelength=120" ]
      # cpplint's hook (upstream .pre-commit-hooks.yaml) gates files via a `files:` extension regex,
      # not an identify "type" - and that regex doesn't include .inc, so it silently skips
      # route_guide_db.inc. Named explicitly here rather than via a \.inc$ glob, since it's spliced
      # code, not a self-contained header - not something to auto-lint on extension alone if other
      # .inc files show up later for different reasons.
      - id: cpplint
        name: cpplint (route_guide_db.inc)
        types: [text]
        files: ^rg_service/route_guide_db\.inc$
        args: [ "--extensions=inc", *cpplint_filter, *cpplint_linelength ]
